name: checkout_flow_flutter_sdk
description: A Flutter plugin for integrating Checkout.com payment gateway with support for card tokenization and Google Pay.
version: 0.1.0
homepage: https://github.com/muhammadrashadomar/Checkout-Flow-Flutter-SDK

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.checkout.flutter
        pluginClass: CheckoutFlutterBridgePlugin
      ios:
        pluginClass: CheckoutFlutterBridgePlugin
